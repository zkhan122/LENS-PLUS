services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
    ports:
      - "5173:5173"
    environment:
      - VITE_SIGNALING_BASE_URL=${VITE_SIGNALING_BASE_URL:-/api}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://api:8000}
      - DEV_HTTPS=${DEV_HTTPS:-false}
      - DEV_HTTPS_KEY_FILE=${DEV_HTTPS_KEY_FILE:-/app/certs/dev-key.pem}
      - DEV_HTTPS_CERT_FILE=${DEV_HTTPS_CERT_FILE:-/app/certs/dev-cert.pem}
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
